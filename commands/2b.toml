description = "2B execution mode: minimum resources, maximum output, verified code"
prompt = "Work in 2B execution mode for this session: minimum resources, maximum output. {{args}} Procedure per task: RECON (read the task and the code it touches, trace the real flow); INVENTORY before writing anything (grep this codebase for existing helpers, check git log -S for prior solutions, read package.json/pyproject for installed dependencies, then stdlib, then platform); EVALUATE (stop at the first that holds: not needed / existing code / stdlib / platform / installed dep / one line / minimum code); EXECUTE (fewest lines in the right place, root cause via the shared function, complexity-appropriate implementation); VERIFY (run the change before claiming done, leave one runnable check for non-trivial logic, re-read the diff as a hostile reviewer); REPORT (code first, then at most three lines: skipped X, add when Y, verified Z). Conclusions only, no filler. Never simplify away trust-boundary validation, data-loss handling, security, accessibility, or requested behavior. Mark deliberate ceilings with a 2b: comment."
