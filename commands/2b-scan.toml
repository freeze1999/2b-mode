description = "2B scan: review the current diff for over-engineering, findings only"
prompt = "Scan the current diff for over-engineering only, not correctness. Read git diff (staged and unstaged) or the target: {{args}}, and the code each hunk touches. Verify every finding against the real code. One line per finding, ranked most damage first: file:line, what to cut, then the lower-rung replacement, with the deletion count. Tags: delete (dead/speculative), stdlib (reinvented standard library), native (dependency doing platform work), yagni (one-implementation abstraction), shrink (same logic fewer lines). End with 'scan clean' or 'N confirmed, deepest cut: file'. Never flag trust-boundary validation, data-loss handling, security, accessibility, requested behavior, or small runnable checks."
