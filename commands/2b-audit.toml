description = "2B audit: full-repo sweep for dead weight, evidence then kill list"
prompt = "Sweep the whole repo for dead weight: dead code, single-consumer abstractions, dependency creep, duplication, config for constants. Confirm each with a grep or trace before listing it. Ranked kill list, biggest deletion first, at most ten: rank, file(s), what, -N lines, evidence. End with 'total recoverable: ~N lines across M files', or 'area clear' if nothing. Never list trust-boundary validation, data-loss handling, security, accessibility, requested behavior, or runnable checks."
